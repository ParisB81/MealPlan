# Nixpacks configuration for Railway deployment
# Installs system Chromium + dependencies for Puppeteer recipe scraping

[phases.setup]
aptPkgs = [
  'chromium',
  'libnss3',
  'libatk1.0-0',
  'libatk-bridge2.0-0',
  'libcups2',
  'libdrm2',
  'libxkbcommon0',
  'libxcomposite1',
  'libxdamage1',
  'libxfixes3',
  'libxrandr2',
  'libgbm1',
  'libpango-1.0-0',
  'libcairo2',
  'libasound2',
  'libxshmfence1',
  'fonts-liberation',
]

[variables]
# Use system Chromium instead of downloading Puppeteer's bundled one
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = 'true'
PUPPETEER_EXECUTABLE_PATH = '/usr/bin/chromium'
