<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>MealPlan - Meal Planning & Cooking</title>
    <script>
      // FOUC prevention: apply saved theme before first paint
      (function() {
        try {
          var t = localStorage.getItem('mealplan_theme');
          if (t) {
            document.documentElement.dataset.theme = t;
            // For custom themes, apply cached CSS variables immediately
            if (t.indexOf('custom-') === 0) {
              var cached = localStorage.getItem('mealplan_custom_vars_' + t);
              if (cached) {
                var vars = JSON.parse(cached);
                var s = document.documentElement.style;
                for (var k in vars) {
                  if (vars.hasOwnProperty(k)) s.setProperty(k, vars[k]);
                }
              }
            }
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
